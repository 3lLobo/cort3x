services:
  nginx-proxy:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - app1
      - app2
      - app3
    networks:
      - app-network

  app1:
    image: my-http-service-1 # Replace with your image
    expose:
      - "4000"
    networks:
      - app-network

  app2:
    image: my-http-service-2 # Replace with your image
    expose:
      - "8000"
    networks:
      - app-network

  app3:
    image: my-http-service-3 # Replace with your image
    expose:
      - "8001"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
