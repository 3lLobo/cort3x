[supervisord]
nodaemon=true
user=root
workingdir=/vllm-workspace

[program:api_one]
command=vllm serve %(ENV_EXTRA_ARGS)s
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
logfile_maxbytes=0

[program:api_two]
command=uvicorn guard_proxy:app --host 0.0.0.0 --port 8001
autostart=true
autoresstart=true
#stdout_logfile=/dev/stdout
#stderr_logfile=/dev/stderr
#logfile_maxbytes=0
